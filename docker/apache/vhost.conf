<VirtualHost *:80>
    ServerAdmin webmaster@nexamart.local
    DocumentRoot /var/www/html/frontend/public

    <Directory /var/www/html/frontend/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Rewrite rules for frontend SPA fallback
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.html [L]
    </Directory>

    # API Alias mapping
    Alias /api /var/www/html/backend/public
    
    <Directory /var/www/html/backend/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        # Rewrite rules for backend front controller
        RewriteEngine On
        RewriteBase /api/
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php [L]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/nexamart_error.log
    CustomLog ${APACHE_LOG_DIR}/nexamart_access.log combined
</VirtualHost>
